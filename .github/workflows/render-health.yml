name: Render Health Check

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check relay health
        run: |
          set -euo pipefail
          body="$(curl -fsSL "https://aether-relay-9g68.onrender.com/health")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'

      - name: Check AI health
        run: |
          set -euo pipefail
          body="$(curl -fsSL "https://aether-relay-9g68.onrender.com/ai/health")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'
