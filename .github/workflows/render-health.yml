name: Render Health Check

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    env:
      RELAY_BASE_URL: https://aether-relay-9g68.onrender.com
      RENDER_SERVICE_ID: srv-d5u0g0vgi27c738qntig
    steps:
      - name: Check relay health
        run: |
          set -euo pipefail
          body="$(curl -fsSL "$RELAY_BASE_URL/health")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'

      - name: Check AI health
        run: |
          set -euo pipefail
          body="$(curl -fsSL "$RELAY_BASE_URL/ai/health")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'

      - name: Optional Render API check
        if: ${{ secrets.RENDER_API_KEY != '' }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          curl -fsSL "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" >/tmp/render-service.json
          cat /tmp/render-service.json
