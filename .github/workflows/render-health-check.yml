name: Render Health Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Vercel Deploy"]
    types: [completed]

jobs:
  health:
    runs-on: ubuntu-latest
    env:
      RELAY_BASE_URL: https://aether-relay-9g68.onrender.com
      RENDER_SERVICE_ID: srv-d5u0g0vgi27c738qntig
    steps:
      - name: Validate relay health endpoint
        run: |
          set -euo pipefail
          body="$(curl -fsSL "$RELAY_BASE_URL/health")"
          echo "health: $body"
          echo "$body" | grep -q '"ok":true'

      - name: Validate AI health endpoint
        run: |
          set -euo pipefail
          body="$(curl -fsSL "$RELAY_BASE_URL/ai/health")"
          echo "ai/health: $body"
          echo "$body" | grep -q '"ok":true'

      - name: Optional Render API status check
        if: ${{ secrets.RENDER_API_KEY != '' }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          status_json="$(curl -fsSL "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json")"
          echo "render service status: $status_json"
